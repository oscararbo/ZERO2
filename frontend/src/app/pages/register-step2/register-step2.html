<app-auth-layout title="Finish your profile" subtitle="This helps ZERO personalize your experience." maxWidth="520px">

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>

      <div class="field">
        <label class="field__label" for="s2-fullname">Full name</label>
        <input id="s2-fullname" class="form-control" type="text" formControlName="fullName" autocomplete="name" placeholder="Your full name"
          [class.is-invalid]="form.controls.fullName.touched && form.controls.fullName.invalid" />
        <div class="field__error" [class.field__error--visible]="form.controls.fullName.touched && form.controls.fullName.invalid">
          Minimum 2 characters
        </div>
      </div>

      <div class="measurements">
        <div class="field">
          <label class="field__label" for="s2-weight">Weight (kg)</label>
          <input id="s2-weight" class="form-control" type="number" formControlName="weight" min="30" max="300" step="0.1" placeholder="e.g. 74.5"
            [class.is-invalid]="form.controls.weight.touched && form.controls.weight.invalid" />
          <div class="field__error" [class.field__error--visible]="form.controls.weight.touched && form.controls.weight.invalid">30–300 kg</div>
        </div>

        <div class="field">
          <label class="field__label" for="s2-height">Height (cm)</label>
          <input id="s2-height" class="form-control" type="number" formControlName="height" min="100" max="250" step="1" placeholder="e.g. 178"
            [class.is-invalid]="form.controls.height.touched && form.controls.height.invalid" />
          <div class="field__error" [class.field__error--visible]="form.controls.height.touched && form.controls.height.invalid">100–250 cm</div>
        </div>
      </div>

      <div class="field">
        <label class="field__label" for="s2-weekly">Weekly goal (days)</label>
        <input id="s2-weekly" class="form-control" type="number" formControlName="weeklyGoal" min="1" max="14" placeholder="e.g. 4"
          [class.is-invalid]="form.controls.weeklyGoal.touched && form.controls.weeklyGoal.invalid" />
        <small class="hint">Recommended: 3-5 days for sustainable progress.</small>
        <div class="field__error" [class.field__error--visible]="form.controls.weeklyGoal.touched && form.controls.weeklyGoal.invalid">Enter 1–14 days</div>
      </div>

      <div class="field">
        <label class="field__label" for="s2-goal">Fitness Goal</label>
        <app-ui-select
          ariaLabel="Fitness goal"
          placeholder="Select a goal"
          [options]="fitnessGoalOptions"
          formControlName="fitnessGoal">
        </app-ui-select>
        <div class="field__error" [class.field__error--visible]="form.controls.fitnessGoal.touched && form.controls.fitnessGoal.invalid">Required</div>
      </div>

      <div class="group" formGroupName="interests">
        <p class="group__title">Choose your focus</p>
        <small class="hint">Pick at least one area to personalize your dashboard.</small>

        <label class="check" *ngFor="let i of interestsList; trackBy: trackByInterestKey">
          <input class="form-check-input" type="checkbox" [formControlName]="i.key" />
          <span>{{ i.label }}</span>
        </label>
      </div>

      <div class="form-msg" [class.form-msg--visible]="!!msg()">{{ msg() }}</div>

      <button class="btn btn-light w-100" type="submit" [disabled]="loading()">
        {{ loading() ? 'Saving...' : 'Go to Dashboard' }}
      </button>
    </form>
  </app-auth-layout>
