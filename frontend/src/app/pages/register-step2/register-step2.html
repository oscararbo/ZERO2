<section class="step">
  <div class="box">
    <h1>Finish your profile</h1>
    <p class="muted">This helps ZERO personalize your experience.</p>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <label>
        <span>Full name</span>
        <input type="text" formControlName="fullName" autocomplete="name" />
      </label>

      <div class="measurements">
        <label>
          <span>Weight (kg)</span>
          <input type="number" formControlName="weight" min="30" max="300" step="0.1" />
        </label>

        <label>
          <span>Height (cm)</span>
          <input type="number" formControlName="height" min="100" max="250" step="1" />
        </label>
      </div>

      <label>
        <span>Weekly goal (days)</span>
        <input type="number" formControlName="weeklyGoal" min="1" max="14" />
      </label>

      <label>
        <span>Fitness Goal</span>
        <select formControlName="fitnessGoal">
          <option value="bulk">Muscle Gain</option>
          <option value="cut">Definition</option>
          <option value="maintain">Maintain</option>
        </select>
      </label>

      <div class="group" formGroupName="interests">
        <p class="group__title">Choose your focus</p>

        <label class="check" *ngFor="let i of interestsList; trackBy: trackByInterestKey">
          <input type="checkbox" [formControlName]="i.key" />
          <span>{{ i.label }}</span>
        </label>
      </div>

      <small class="msg" *ngIf="msg()">{{ msg() }}</small>

      <button class="btn" type="submit" [disabled]="loading()">
        {{ loading() ? 'Saving...' : 'Go to Dashboard' }}
      </button>
    </form>
  </div>
</section>
