<div class="modal-backdrop" (click)="cancelled.emit()">
  <div class="modal-box" (click)="$event.stopPropagation()">
    <h3 class="modal-title">{{ title }}</h3>
    <p class="modal-message">{{ message }}</p>
    <div class="modal-actions">
      <button class="btn-cancel" type="button" (click)="cancelled.emit()">{{ cancelLabel }}</button>
      <button class="btn-confirm" [class.btn-danger]="danger" type="button" (click)="confirmed.emit()">{{ confirmLabel }}</button>
    </div>
  </div>
</div>
