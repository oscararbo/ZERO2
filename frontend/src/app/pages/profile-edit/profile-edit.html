<section class="page">
  <header class="top">
    <div class="brand">ZERO</div>
    <div class="title">
      <div class="kicker">Settings</div>
      <h1>Edit Profile</h1>
    </div>
    <a class="btn" routerLink="/dashboard">Back</a>
  </header>

  <main class="content">
    <form [formGroup]="form" (ngSubmit)="save()" class="edit-form" *ngIf="!loadingProfile()">
      <div class="form-group">
        <label for="fullName">Full Name</label>
        <input
          id="fullName"
          type="text"
          formControlName="fullName"
          placeholder="Your name"
          class="input-field"
          [class.error]="fullNameControl.invalid && fullNameControl.touched"
        />
        <small *ngIf="fullNameControl.errors?.['required'] && fullNameControl.touched" class="error-text">
          Name is required
        </small>
        <small *ngIf="fullNameControl.errors?.['minlength'] && fullNameControl.touched" class="error-text">
          Minimum 2 characters
        </small>
      </div>

      <div class="form-group">
        <label for="weeklyGoal">Weekly Goal (sessions)</label>
        <input
          id="weeklyGoal"
          type="number"
          formControlName="weeklyGoal"
          placeholder="1-14"
          min="1"
          max="14"
          class="input-field"
          [class.error]="weeklyGoalControl.invalid && weeklyGoalControl.touched"
        />
        <small *ngIf="weeklyGoalControl.errors?.['required'] && weeklyGoalControl.touched" class="error-text">
          Weekly goal is required
        </small>
      </div>

      <div class="measurements-grid">
        <div class="form-group">
          <label for="weight">Weight (kg)</label>
          <input
            id="weight"
            type="number"
            formControlName="weight"
            placeholder="e.g., 75"
            min="30"
            max="300"
            step="0.1"
            class="input-field"
            [class.error]="weightControl.invalid && weightControl.touched"
          />
            <small *ngIf="weightControl.errors?.['required'] && weightControl.touched" class="error-text">
            Weight is required
          </small>
        </div>

        <div class="form-group">
          <label for="height">Height (cm)</label>
          <input
            id="height"
            type="number"
            formControlName="height"
            placeholder="e.g., 175"
            min="100"
            max="250"
            step="1"
            class="input-field"
            [class.error]="heightControl.invalid && heightControl.touched"
          />
          <small *ngIf="heightControl.errors?.['required'] && heightControl.touched" class="error-text">
            Height is required
          </small>
        </div>
      </div>

      <div class="form-group">
        <label for="fitnessGoal">Fitness Goal</label>
        <select
          id="fitnessGoal"
          formControlName="fitnessGoal"
          class="input-field"
          [class.error]="fitnessGoalControl.invalid && fitnessGoalControl.touched"
        >
          <option value="bulk">Muscle Gain (Bulk)</option>
          <option value="cut">Definition (Cut)</option>
          <option value="maintain">Maintain</option>
        </select>
        <small *ngIf="fitnessGoalControl.errors?.['required'] && fitnessGoalControl.touched" class="error-text">
          Fitness goal is required
        </small>
      </div>

      <fieldset class="interests-section">
        <legend>What are you interested in?</legend>
        <div class="interest-checks" formGroupName="interests">
          <label class="check-label">
            <input type="checkbox" formControlName="sport" />
            <span>Sport</span>
          </label>
          <label class="check-label">
            <input type="checkbox" formControlName="food" />
            <span>Food</span>
          </label>
          <label class="check-label">
            <input type="checkbox" formControlName="mindset" />
            <span>Mindset</span>
          </label>
          <label class="check-label">
            <input type="checkbox" formControlName="growth" />
            <span>Growth</span>
          </label>
          <label class="check-label">
            <input type="checkbox" formControlName="challenges" />
            <span>Challenges</span>
          </label>
        </div>
      </fieldset>

      <div class="message-box" *ngIf="msg()" [class.error]="messageIsError()">
        {{ msg() }}
      </div>

      <button
        type="submit"
        class="submit-btn"
        [disabled]="loading() || form.invalid"
      >
        {{ loading() ? 'Saving...' : 'Save Changes' }}
      </button>
    </form>

    <div *ngIf="loadingProfile()" class="loading-state">
      Loading profile...
    </div>
  </main>
</section>
