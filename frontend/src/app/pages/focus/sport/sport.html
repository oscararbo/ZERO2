<section class="page">
  <app-focus-page-header title="Sport" [toastMessage]="toast()"></app-focus-page-header>

  <main class="content container-xl pb-5">
    <div class="controls-bar">

      <div class="location-toggle">
        <button
          class="toggle-btn"
          [class.active]="currentLocation() === 'home'"
          (click)="setLocation('home')">
          Home
        </button>
        <button
          class="toggle-btn"
          [class.active]="currentLocation() === 'gym'"
          (click)="setLocation('gym')">
          Gym
        </button>
      </div>

      <div class="category-carousel d-flex flex-wrap gap-2">
        <button
          *ngFor="let cat of categories"
          class="category-btn btn btn-sm"
          [class.active]="selectedCategory() === cat.key"
          (click)="selectCategory(cat.key)">
          {{ cat.label }}
        </button>
      </div>
    </div>

    <app-page-state
      [loading]="loading()"
      [empty]="exerciseRows().length === 0"
      loadingText="Loading exercises..."
      emptyText="No exercises found for this selection">
    </app-page-state>

    <div class="exercises-container" *ngIf="!loading() && exerciseRows().length > 0">
      <article class="exercise-card" *ngFor="let row of exerciseRows(); trackBy: trackByExerciseId">
        <ng-container *ngIf="row.exercise as exercise">
        <div class="exercise-header d-flex justify-content-between align-items-start gap-3">
          <h3>{{ exercise.name }}</h3>
          <div class="exercise-meta">
            {{ exercise.default_sets }} sets × {{ exercise.default_reps }} reps
          </div>
        </div>

        <p class="exercise-desc" *ngIf="exercise.description">{{ exercise.description }}</p>

        <div class="exercise-controls">
          <div class="input-group">
            <label>Sets</label>
            <input
              type="number"
              class="form-control"
              [ngModel]="row.state.sets"
              (ngModelChange)="updateExerciseState(exercise.id, 'sets', $event)"
              min="0"
              max="10">
          </div>

          <div class="input-group">
            <label>Reps</label>
            <input
              type="number"
              class="form-control"
              [ngModel]="row.state.reps"
              (ngModelChange)="updateExerciseState(exercise.id, 'reps', $event)"
              min="0"
              max="50">
          </div>

          <div class="checkbox-group">
            <input
              type="checkbox"
              [id]="'exercise-' + exercise.id"
              [ngModel]="row.state.completed"
              (ngModelChange)="updateExerciseState(exercise.id, 'completed', $event)">
            <label [for]="'exercise-' + exercise.id">Done</label>
          </div>
        </div>
        </ng-container>
      </article>
    </div>

    <div class="action-bar" *ngIf="!loading() && exerciseRows().length > 0">
      <button class="save-btn btn btn-light" (click)="saveSession()" [disabled]="!hasCompletedExercises()">
        Save Workout
      </button>
    </div>
  </main>
</section>
