<section class="not-found-shell">

  <div class="not-found-card">

      <a routerLink="/dashboard" class="ghost-link">Go to Dashboard</a>

    <div class="signal-grid" aria-hidden="true">
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
    </div>
